name: SIS Laravel CI

on:
  push:
    paths:
      - 'apps/sis-laravel/**'
      - '.github/workflows/sis-laravel.yml'
  pull_request:
    paths:
      - 'apps/sis-laravel/**'
      - '.github/workflows/sis-laravel.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/sis-laravel

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Configure application for tests
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/sis-laravel/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Laravel tests
        run: php artisan test

      - name: Build frontend assets
        run: npm run build
