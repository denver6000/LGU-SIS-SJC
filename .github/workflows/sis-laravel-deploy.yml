name: Deploy SIS Laravel to Hostinger

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/sis-laravel

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, mysql
          coverage: none
          tools: composer:v2

      - name: Install production Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/sis-laravel/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare release archive
        run: |
          tar --exclude='.env' \
              --exclude='.env.*' \
              --exclude='node_modules' \
              --exclude='storage/logs/*' \
              --exclude='release.tar.gz' \
              -czf release.tar.gz .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: sis-laravel-release
          path: apps/sis-laravel/release.tar.gz
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: sis-laravel-release

      - name: Upload release to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: ~/domains/sjc-sis.dmballesteros.com/sis-laravel/

      - name: Activate release on Hostinger
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/domains/sjc-sis.dmballesteros.com/sis-laravel
            test -f .env
            tar -xzf release.tar.gz
            rm -f release.tar.gz
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
